name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: snake-game-windows
            extension: .exe
          - os: ubuntu-latest
            artifact_name: snake-game-linux
            extension: .tar.gz
          - os: macos-latest
            artifact_name: snake-game-macos
            extension: .tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name snake-game src/main.py
          New-Item -ItemType Directory -Path dist -Force -ErrorAction SilentlyContinue
          Move-Item dist/snake-game.exe "dist/${{ matrix.artifact_name }}${{ matrix.extension }}"

      - name: Build on macOS
        if: matrix.os == 'macos-latest'
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name snake-game src/main.py
          mkdir -p dist
          mv dist/snake-game dist/${{ matrix.artifact_name }}
          tar -czf dist/${{ matrix.artifact_name }}${{ matrix.extension }} -C dist ${{ matrix.artifact_name }}
          rm -f dist/${{ matrix.artifact_name }}

      - name: Build on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name snake-game src/main.py
          mkdir -p dist
          mv dist/snake-game dist/${{ matrix.artifact_name }}
          tar -czf dist/${{ matrix.artifact_name }}${{ matrix.extension }} -C dist ${{ matrix.artifact_name }}
          rm -f dist/${{ matrix.artifact_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          ls -la
          # Create checksums.txt
          > checksums.txt
          for file in */*; do
            if [ -f "$file" ]; then
              sha256sum "$file" >> checksums.txt
            fi
          done
          cat checksums.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # List all files in artifacts
          ls -laR artifacts/

          # Create release with artifacts
          TAG_NAME="${{ github.ref_name }}"
          TITLE_NAME="${TAG_NAME#v} Release"
          gh release create "$TAG_NAME" \
            --title "$TITLE_NAME" \
            --generate-notes \
            artifacts/snake-game-windows/snake-game-windows.exe \
            artifacts/snake-game-linux/snake-game-linux.tar.gz \
            artifacts/snake-game-macos/snake-game-macos.tar.gz \
            artifacts/checksums.txt